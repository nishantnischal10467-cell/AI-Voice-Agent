services:
  - type: web
    name: ai-voice-agent-web
    runtime: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_LOCAL_PATH
        value: .qdrant
      - key: EMBEDDING_MODEL_NAME
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: EMBEDDING_BATCH_SIZE
        value: "16"
