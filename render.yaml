services:
  - type: web
    name: ai-voice-agent-web
    runtime: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 180
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_LOCAL_PATH
        value: .qdrant
      - key: EMBEDDING_MODEL_NAME
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: EMBEDDING_BATCH_SIZE
        value: "8"
      - key: SEARCH_LIMIT
        value: "3"
      - key: TTS_MODEL_NAME
        value: tts-1
      - key: OPENAI_TIMEOUT_SECONDS
        value: "60"
      - key: AUDIO_TTL_SECONDS
        value: "3600"
