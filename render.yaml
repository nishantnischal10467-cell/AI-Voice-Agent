services:
  - type: web
    name: ai-voice-agent-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_API_KEY
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
