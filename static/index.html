<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice RAG Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080b14;
    --surface:   rgba(255,255,255,0.04);
    --border:    rgba(255,255,255,0.08);
    --accent:    #00e5ff;
    --accent2:   #7b5ea7;
    --accent3:   #ff6b6b;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --success:   #34d399;
    --error:     #f87171;
    --radius:    16px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-head);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background ──────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(0,229,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%,  rgba(123,94,167,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%,   rgba(255,107,107,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ───────────────────────────────────────────── */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeDown .6s ease both;
  }

  .logo-ring {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: grid; place-items: center;
    box-shadow: 0 0 24px rgba(0,229,255,0.3);
    flex-shrink: 0;
  }

  .logo-ring svg { width: 26px; height: 26px; fill: var(--accent); }

  .header-text h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header-text h1 span { color: var(--accent); }

  .header-text p {
    font-family: var(--font-mono);
    font-size: .75rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: .04em;
  }

  /* ── Card ─────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    margin-bottom: 20px;
    animation: fadeUp .5s ease both;
  }

  .card-title {
    font-size: .7rem;
    font-family: var(--font-mono);
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Upload zone ──────────────────────────────────────── */
  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .25s, background .25s;
    position: relative;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
  }

  #drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  #drop-zone .dz-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }

  #drop-zone .dz-label {
    font-size: .9rem;
    color: var(--muted);
  }

  #drop-zone .dz-label strong { color: var(--accent); font-weight: 600; }

  /* ── Doc list ─────────────────────────────────────────── */
  #doc-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

  .doc-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: .78rem;
    animation: fadeUp .3s ease both;
  }

  .doc-chip .chip-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    flex-shrink: 0;
  }

  /* ── Voice selector ───────────────────────────────────── */
  .voice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .voice-btn {
    font-family: var(--font-mono);
    font-size: .75rem;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .04em;
  }

  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }

  .voice-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
    box-shadow: 0 0 16px rgba(0,229,255,0.35);
  }

  /* ── Query input ──────────────────────────────────────── */
  .query-wrap {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #query-input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--font-head);
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    resize: none;
    min-height: 56px;
  }

  #query-input::placeholder { color: var(--muted); }

  #query-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
  }

  #query-input:disabled { opacity: .4; cursor: not-allowed; }

  #ask-btn {
    width: 52px; height: 52px;
    flex-shrink: 0;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #000;
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform .15s, box-shadow .15s, opacity .2s;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }

  #ask-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 0 28px rgba(0,229,255,0.5); }
  #ask-btn:active:not(:disabled) { transform: scale(.97); }
  #ask-btn:disabled { opacity: .4; cursor: not-allowed; }
  #ask-btn svg { width: 22px; height: 22px; }

  /* ── Progress / steps ─────────────────────────────────── */
  #progress-wrap { display: none; margin-top: 8px; }

  .step-list { display: flex; flex-direction: column; gap: 6px; }

  .step-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: .75rem;
    color: var(--muted);
    transition: color .3s;
  }

  .step-item.active { color: var(--accent); }
  .step-item.done   { color: var(--success); }
  .step-item.err    { color: var(--error); }

  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .step-item.active .step-dot { animation: pulse 1s infinite; }

  /* ── Response ─────────────────────────────────────────── */
  #response-wrap { display: none; }

  .response-text {
    font-size: .95rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Audio player ─────────────────────────────────────── */
  .audio-card {
    margin-top: 18px;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .audio-label {
    font-size: .7rem;
    font-family: var(--font-mono);
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  audio {
    width: 100%;
    border-radius: 8px;
    accent-color: var(--accent);
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: .75rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, color .2s;
    width: fit-content;
  }

  .dl-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Sources ──────────────────────────────────────────── */
  .sources-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .source-tag {
    font-family: var(--font-mono);
    font-size: .7rem;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(123,94,167,0.15);
    border: 1px solid rgba(123,94,167,0.3);
    color: #c4b5fd;
  }

  /* ── Toast ────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: #1a1d2e;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-family: var(--font-mono);
    font-size: .78rem;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(20px);
    opacity: 0;
    transition: transform .3s, opacity .3s;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.ok   { border-color: rgba(52,211,153,0.4); color: var(--success); }
  #toast.bad  { border-color: rgba(248,113,113,0.4); color: var(--error); }

  /* ── Upload spinner ───────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,229,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* ── Animations ───────────────────────────────────────── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,.6); }
    50%      { box-shadow: 0 0 0 5px rgba(0,229,255,0); }
  }

  .card:nth-child(2) { animation-delay: .1s; }
  .card:nth-child(3) { animation-delay: .2s; }
  .card:nth-child(4) { animation-delay: .3s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm0 14a7 7 0 0 0 7-7h2a9 9 0 0 1-8 8.94V20h3v2H8v-2h3v-2.06A9 9 0 0 1 3 9h2a7 7 0 0 0 7 7z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Voice <span>RAG</span> Agent</h1>
      <p>// upload · query · listen</p>
    </div>
  </header>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">01 &mdash; Documents</div>
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".pdf" />
      <span class="dz-icon">📄</span>
      <p class="dz-label"><strong>Click to upload</strong> or drag &amp; drop a PDF</p>
    </div>
    <div id="doc-list"></div>
  </div>

  <!-- Voice -->
  <div class="card">
    <div class="card-title">02 &mdash; Voice</div>
    <div class="voice-grid" id="voice-grid">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- Query -->
  <div class="card">
    <div class="card-title">03 &mdash; Ask</div>
    <div class="query-wrap">
      <textarea
        id="query-input"
        rows="2"
        placeholder="Upload a PDF first, then ask your question…"
        disabled
      ></textarea>
      <button id="ask-btn" disabled title="Send">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div id="progress-wrap">
      <div class="step-list" id="step-list"></div>
    </div>
  </div>

  <!-- Response -->
  <div class="card" id="response-wrap">
    <div class="card-title">04 &mdash; Response</div>
    <div class="response-text" id="response-text"></div>
    <div class="audio-card" id="audio-card" style="display:none">
      <div class="audio-label" id="audio-label"></div>
      <audio id="audio-player" controls></audio>
      <a class="dl-btn" id="dl-btn" href="#" download>
        ↓ &nbsp;Download MP3
      </a>
    </div>
    <div class="sources-list" id="sources-list"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const VOICES = ["alloy","ash","ballad","coral","echo","fable","onyx","nova","sage","shimmer","verse"];
let selectedVoice  = "coral";
let setupComplete  = false;
let busy           = false;

const STEPS = [
  "Generating query embedding…",
  "Searching vector database…",
  "Building context from results…",
  "Running documentation agent…",
  "Generating voice instructions…",
  "Synthesising audio…",
];

// ── DOM refs ───────────────────────────────────────────────────────────────
const dropZone     = document.getElementById("drop-zone");
const fileInput    = document.getElementById("file-input");
const docList      = document.getElementById("doc-list");
const voiceGrid    = document.getElementById("voice-grid");
const queryInput   = document.getElementById("query-input");
const askBtn       = document.getElementById("ask-btn");
const progressWrap = document.getElementById("progress-wrap");
const stepList     = document.getElementById("step-list");
const responseWrap = document.getElementById("response-wrap");
const responseText = document.getElementById("response-text");
const audioCard    = document.getElementById("audio-card");
const audioLabel   = document.getElementById("audio-label");
const audioPlayer  = document.getElementById("audio-player");
const dlBtn        = document.getElementById("dl-btn");
const sourcesList  = document.getElementById("sources-list");
const toast        = document.getElementById("toast");

// ── Init ───────────────────────────────────────────────────────────────────
buildVoiceGrid();
fetchStatus();

async function fetchStatus() {
  try {
    const r = await fetch("/api/status");
    const d = await r.json();
    setupComplete  = d.setup_complete;
    selectedVoice  = d.selected_voice || "coral";
    d.processed_documents.forEach(addDocChip);
    updateUI();
    updateVoiceGrid();
  } catch (_) {}
}

// ── Voice grid ─────────────────────────────────────────────────────────────
function buildVoiceGrid() {
  VOICES.forEach(v => {
    const btn = document.createElement("button");
    btn.className = "voice-btn" + (v === selectedVoice ? " active" : "");
    btn.textContent = v;
    btn.dataset.voice = v;
    btn.addEventListener("click", () => selectVoice(v));
    voiceGrid.appendChild(btn);
  });
}

function updateVoiceGrid() {
  voiceGrid.querySelectorAll(".voice-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.voice === selectedVoice);
  });
}

async function selectVoice(v) {
  selectedVoice = v;
  updateVoiceGrid();
  await fetch("/api/voice", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({voice: v}),
  });
}

// ── File upload ────────────────────────────────────────────────────────────
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
});

async function uploadFile(file) {
  if (!file.name.endsWith(".pdf")) { showToast("Only PDF files are supported.", "bad"); return; }

  const dz     = dropZone.querySelector(".dz-label");
  const orig   = dz.innerHTML;
  dz.innerHTML = `<span class="spinner"></span>Processing <strong>${file.name}</strong>…`;

  const fd = new FormData();
  fd.append("file", file);

  try {
    const r = await fetch("/api/upload", { method: "POST", body: fd });
    const d = await r.json();

    if (d.error)   { showToast(d.error, "bad"); }
    else if (d.already) { showToast(`'${file.name}' already loaded.`, "ok"); }
    else {
      showToast(`✓ ${file.name} — ${d.chunks} chunks indexed`, "ok");
      addDocChip(d.filename);
      setupComplete = true;
      updateUI();
    }
  } catch (e) {
    showToast("Upload failed: " + e.message, "bad");
  } finally {
    dz.innerHTML = orig;
    fileInput.value = "";
  }
}

function addDocChip(name) {
  // avoid duplicates
  if ([...docList.querySelectorAll(".doc-chip")].some(c => c.dataset.name === name)) return;
  const chip = document.createElement("div");
  chip.className = "doc-chip";
  chip.dataset.name = name;
  chip.innerHTML = `<span class="chip-dot"></span>${name}`;
  docList.appendChild(chip);
}

// ── Query ──────────────────────────────────────────────────────────────────
askBtn.addEventListener("click", sendQuery);
queryInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

async function sendQuery() {
  const q = queryInput.value.trim();
  if (!q || busy || !setupComplete) return;

  busy = true;
  askBtn.disabled = true;
  queryInput.disabled = true;

  // Reset response area
  responseWrap.style.display = "block";
  responseText.textContent = "";
  audioCard.style.display  = "none";
  sourcesList.innerHTML    = "";

  // Show steps
  progressWrap.style.display = "block";
  stepList.innerHTML = "";
  const stepEls = STEPS.map((label, i) => {
    const el = document.createElement("div");
    el.className = "step-item" + (i === 0 ? " active" : "");
    el.innerHTML = `<span class="step-dot"></span>${label}`;
    stepList.appendChild(el);
    return el;
  });

  // Fake step progression while waiting
  let stepIdx = 0;
  const stepTimer = setInterval(() => {
    if (stepIdx < stepEls.length - 1) {
      stepEls[stepIdx].className  = "step-item done";
      stepIdx++;
      stepEls[stepIdx].className  = "step-item active";
    }
  }, 1800);

  try {
    const r = await fetch("/api/query", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ query: q }),
    });
    const d = await r.json();

    clearInterval(stepTimer);
    stepEls.forEach(el => el.className = d.error ? "step-item err" : "step-item done");

    if (d.error) {
      showToast(d.error, "bad");
      responseText.textContent = "Error: " + d.error;
    } else {
      responseText.textContent = d.text_response;

      // Audio
      if (d.audio_id) {
        const audioUrl = `/api/audio/${d.audio_id}`;
      audioPlayer.src = audioUrl;
      dlBtn.href      = audioUrl;
      dlBtn.download  = `voice_response_${selectedVoice}.mp3`;
      audioLabel.textContent = `🔊  Voice: ${selectedVoice}`;
      audioCard.style.display = "flex";
      } else {
        audioPlayer.removeAttribute("src");
        dlBtn.removeAttribute("href");
        audioCard.style.display = "none";
      }

      // Sources
      (d.sources || []).forEach(src => {
        const tag = document.createElement("span");
        tag.className   = "source-tag";
        tag.textContent = src;
        sourcesList.appendChild(tag);
      });

      queryInput.value = "";
      showToast("Response ready ✓", "ok");
    }
  } catch (e) {
    clearInterval(stepTimer);
    stepEls.forEach(el => el.className = "step-item err");
    showToast("Request failed: " + e.message, "bad");
  } finally {
    busy = false;
    updateUI();
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function updateUI() {
  queryInput.disabled = !setupComplete || busy;
  askBtn.disabled     = !setupComplete || busy;
  queryInput.placeholder = setupComplete
    ? "Ask anything about your documents…"
    : "Upload a PDF first, then ask your question…";
}

let toastTimer;
function showToast(msg, type = "") {
  toast.textContent = msg;
  toast.className   = "show " + (type || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ""; }, 3500);
}
</script>
</body>
</html>
